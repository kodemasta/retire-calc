name: Build Installers
on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: calc-windows
            asset: dist/calc.exe
            pyinstaller_args: --onefile --windowed --name calc
            zip: false
          - os: macos-latest
            artifact: calc-macos
            asset: dist/calc-macos.zip
            pyinstaller_args: --onefile --windowed --name calc
            zip: true
          - os: ubuntu-22.04
            artifact: calc-linux-22.04
            asset: dist/calc-linux-22.04.tar.gz
            pyinstaller_args: --onefile --name calc
            zip: true
          - os: ubuntu-24.04
            artifact: calc-linux-24.04
            asset: dist/calc-linux-24.04.tar.gz
            pyinstaller_args: --onefile --name calc
            zip: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install tkinter (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu-')
        run: sudo apt-get install -y python3-tk

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.pyinstaller_args }} calc.py

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: zip -r dist/calc-macos.zip dist/calc.app

      - name: Package (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: tar -czf ${{ matrix.asset }} -C dist calc

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset }}
